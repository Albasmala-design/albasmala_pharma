name: Build Albasmala Pharma APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
      - run: flutter create .
      - run: git checkout -- lib/ pubspec.yaml README.md || true
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: albasmala-pharma-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
